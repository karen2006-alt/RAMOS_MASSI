<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            background-color: #F8EDFB;
        }
        .sidebar-custom {
            background-color: #522566 !important;
        }
        .content-custom {
            background-color: #EADFFO;
        }
        .nav-link {
            color: white !important;
        }
        .nav-link:hover {
            color: #AD74C3 !important;
        }
        .card {
            background-color: #7A3A8E;
            color: white;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    
    <div class="row">

        <!-- Sidebar -->
        <div class="col-2 sidebar-custom text-white vh-100">
            <h4 class="mt-3 text-center">Dashboard</h4>
            <ul class="nav flex-column mt-4">
                <li class="nav-item shadow">
                    <a class="nav-link text-white" href="#">Inicio</a>
                </li>
                <li class="nav-item shadow">
                    <a class="nav-link text-white" href="#">Usuarios</a>
                </li>
                <li class="nav-item shadow">
                    <a class="nav-link text-white" href="#">Reportes</a>
                </li>
                <li class="nav-item shadow">
                    <a class="nav-link text-white" href="#">Configuración</a>
                </li>
            </ul>
        </div>

        <!-- Área de contenido -->
        <div class="col-10 content-custom">

            <h2 class="mt-4">Panel Administrativo</h2>
            <p>Bienvenido al sistema administrativo.</p>

            <div class="row mt-4">

                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body">
                            <h5>Usuarios</h5>
                            <p>120 registrados</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body">
                            <h5>Ventas</h5>
                            <p>$3,500 este mes</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body">
                            <h5>Reportes</h5>
                            <p>15 generados</p>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
